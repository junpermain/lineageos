name: Firefox Android ARM64 CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Clone Firefox official Git repo
        uses: actions/checkout@v4
        with:
          repository: mozilla-firefox/firefox
          ref: main
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential python3 python3-dev python3-pip curl unzip zip openjdk-17-jdk-headless

      - name: Bootstrap Android build environment
        run: |
          ./mach bootstrap --application-choice=android_arm64 --no-interactive

      - name: Write .mozconfig for ARM64
        run: |
          cat > .mozconfig <<EOF
          ac_add_options --target=aarch64-linux-android
          ac_add_options --enable-optimize
          ac_add_options --disable-debug
          ac_add_options --disable-tests
          ac_add_options --disable-crashreporter
          mk_add_options MOZ_OBJDIR=obj-arm64
          mk_add_options MOZ_MAKE_FLAGS="-j$(nproc)"
          EOF

      - name: Build Firefox for Android
        run: |
          ./mach build
          ./mach package
          ./mach gradle fenix:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: firefox-arm64-apk
          path: obj-arm64/dist/fenix-*-arm64-v8a.apk
